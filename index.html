<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    
    <!-- الأيقونات وملف التثبيت PWA -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- إعدادات الشاشة -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- 🟢 تلوين الشريط العلوي (Status Bar) للأندرويد ومتصفحات الهاتف -->
    <meta name="theme-color" content="#020617" />

    <!-- 🟢 إعدادات PWA وشريط الحالة لأجهزة الآيفون (iOS) -->
    <!-- هذا السطر يجعل التطبيق يعمل بملء الشاشة في الآيفون -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- هذا السطر يجعل شريط البطارية والإشعارات شفافاً ليأخذ لون خلفية التطبيق -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- اسم التطبيق عند حفظه في الآيفون -->
    <meta name="apple-mobile-web-app-title" content="RadarX" />
    
    <!-- 🟢 شاشة البداية (Splash Screen) لأجهزة الآيفون -->
    <link rel="apple-touch-startup-image" href="/logo.png" />

    <title>Crypto RadarX</title>
